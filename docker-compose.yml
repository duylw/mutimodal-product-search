services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  inference:
    build: ./inference
    ports:
      - "8001:8001"
    environment:
      - MODEL_ID=openai/clip-vit-base-patch32

  backend:
    build: ./backend
    command: sh -c "python indexer.py && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - INFERENCE_URL=http://inference:8001
    volumes:
      - ./sample_images:/app/sample_images
    depends_on:
      - qdrant
      - inference

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./sample_images:/app/sample_images
    depends_on:
      - backend
